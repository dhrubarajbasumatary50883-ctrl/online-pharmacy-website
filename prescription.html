<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Prescription | Genuine Pharma</title>
    <link rel="stylesheet" href="prescription.css">
</head>

<body>

<div class="prescription-container">

    <h2>Upload Your Prescription</h2>

    <p class="subtitle">
        Upload a valid doctor's prescription to order prescription medicines.
    </p>

    <form id="prescriptionForm">

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">

        <label>Mobile Number</label>
        <input type="tel" id="phone" placeholder="Enter your mobile number">

        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Upload Prescription</label>

        <input type="file"
               id="prescriptionFile"
               accept=".jpg,.jpeg,.png,.pdf">

        <p id="fileName">No file selected</p>

        <label>Additional Notes</label>

        <textarea
            id="notes"
            placeholder="Write any instructions (Optional)">
        </textarea>

        <button type="button" onclick="submitPrescription()">
            Submit Prescription
        </button>

    </form>

</div>

<div id="messageBox" class="message-box">
    <span id="messageText"></span>
</div>

<script src="prescription.js"></script>

</body>
</html>
