<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Genuine Pharma</title>
    <link rel="stylesheet" href="checkout.css">
</head>

<body>

<div class="checkout-container">

    <h2>Checkout</h2>

    <div class="checkout-grid">

        <div class="customer-info">

            <h3>Delivery Details</h3>

            <input type="text" id="name" placeholder="Full Name">

            <input type="tel" id="phone" placeholder="Mobile Number">

            <input type="email" id="email" placeholder="Email Address">

            <textarea id="address" placeholder="Delivery Address"></textarea>

            <input type="text" id="city" placeholder="City">

            <input type="text" id="pin" placeholder="PIN Code">

            <h3>Delivery Option</h3>

        <label>
            <input type="radio" name="delivery" value="Home Delivery" checked>
             Home Delivery
        </label>

        <label>
            <input type="radio" name="delivery" value="Store Pickup">
              Store Pickup
        </label>

            <h3>Payment Method</h3>

            <label><input type="radio" name="payment" checked> Cash on Delivery</label>

            <label><input type="radio" name="payment"> UPI</label>

            <label><input type="radio" name="payment"> Credit / Debit Card</label>

        </div>

        <div class="order-summary">

            <h3>Order Summary</h3>

            <div id="summaryItems"></div>

            <h2 id="grandTotal">Total : ₹0</h2>

            <button onclick="placeOrder()">Place Order</button>

        </div>

    </div>

</div>

<script src="checkout.js"></script>
<div id="messageBox" class="message-box">
    <span id="messageText"></span>
</div>

</body>
</html>
